    <!-- Structured Data: FAQ (Expanded) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quais tipos de veículos vocês transportam?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trabalhamos com todos os tipos: carros clássicos (+30 anos), veículos 0km, motos, camionetas, utilitários e Motor Homes. Tanto na importação quanto na exportação, para e de qualquer lugar do mundo, independente do tipo de combustível ou direção."
          }
        },
        {
          "@type": "Question",
          "name": "Posso importar carros usados para o Brasil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No Brasil, a importação de carros usados é permitida apenas para veículos com mais de 30 anos (considerados antiguidade/clássicos). Para veículos mais novos, trabalhamos com importação de zero km. Veículos usados podem entrar via admissão temporária para corrida ou exposição."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa importar um carro dos EUA para o Brasil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O custo varia conforme o valor do veículo, tipo e estado de destino. Os principais tributos são: II (Imposto de Importação - 35%), IPI (6,2% a 6,5%), PIS, COFINS, ICMS (varia por estado) e AFRMM (25% sobre frete marítimo). Use nossa calculadora online em calculadora.enviandomeucarro.com para simular todos os custos detalhadamente."
          }
        },
        {
          "@type": "Question",
          "name": "Qual o prazo para importar um carro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para importação de veículos 0km, o prazo é de 50 a 80 dias. Para clássicos (+30 anos), de 67 a 115 dias (inclui laudo ACB). Para exportação, a partir de 4 semanas dependendo do destino. Esses são prazos estimados que podem variar conforme documentação, destino e condições logísticas."
          }
        },
        {
          "@type": "Question",
          "name": "O transporte de veículos tem seguro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Oferecemos seguro internacional obrigatório (All Risks) em todas as operações, cobrindo seu veículo durante todo o trajeto. Isso inclui cobertura contra danos, avarias, roubo e sinistros durante o transporte marítimo ou aéreo."
          }
        },
        {
          "@type": "Question",
          "name": "Vocês também exportam veículos do Brasil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Oferecemos serviço completo de exportação do Brasil para qualquer destino no mundo. O serviço inclui recebimento, transporte rodoviário, despachante, estufagem, frete e seguro marítimos, desembaraço no destino e entrega final."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona a importação de veículos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O processo envolve: escolha do veículo (com nossa assessoria em feiras e leilões), compra, preparação e embarque no país de origem, frete marítimo ou aéreo com seguro All Risks, chegada ao porto brasileiro, despacho aduaneiro completo (DI, licenças, conferência), pagamento de tributos, e entrega do veículo na sua porta. A EMC cuida de todo o processo ou apenas das etapas que você escolher."
          }
        },
        {
          "@type": "Question",
          "name": "Vocês importam peças e acessórios automotivos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim! Importamos peças originais e acessórios do mundo inteiro para seu clássico ou importado. É uma forma de economizar tempo e dinheiro, com a mesma segurança e transparência dos nossos serviços de transporte de veículos."
          }
        }
      ]
    }
    </script>
