          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trabalhamos com todos os tipos: carros clássicos (+30 anos), veículos 0km, motos, camionetas, utilitários e Motor Homes. Tanto na importação (EUA → Brasil) quanto na exportação (Brasil → EUA)."

        {
          "@type": "Question",
          "name": "Posso importar carros usados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No Brasil, a importação de carros usados é permitida apenas para veículos com mais de 30 anos (considerados antiguidade). Para veículos mais novos, trabalhamos com importação de zero km."
          }
        },
        {
          "@type": "Question",
          "name": "Qual o prazo do processo completo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para importação de veículos 0km, de 50 a 80 dias. Para clássicos (+30 anos), de 67 a 115 dias. Para exportação Brasil → EUA, de 4 a 5 semanas."
          }
        },
        {
          "@type": "Question",
          "name": "Quais impostos eu preciso pagar na importação?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Os principais tributos são: II (35%), IPI (6,2% a 6,5%), PIS, COFINS, ICMS e AFRMM (25% sobre frete marítimo). Use nossa calculadora online para simular todos os custos."
          }
        },
        {
          "@type": "Question",
          "name": "O transporte tem seguro?",
